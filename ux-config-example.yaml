# ux-config-example.yaml — 預設基準值
# 來自 BK POS 管理頁面 prototype 的設計語言
# 自然語言修改：「主色改藍色」「平台改 Web」「圓角改 4」

product:
  name: ""
  type: "iPad App"
  domain: ""
  target_users: ""
  usage_context: ""

project:
  name: ""
  slug: ""

brand:
  colors:
    # 品牌橘 × 3
    brand: "#FF6B2B"            # 主色（sidebar active、強調）
    brand_light: "#FFF0E0"      # 淺底（tag、提示背景）
    brand_dark: "#C84B00"       # 深色（未付款文字）

    # 灰 × 3（iOS system gray）
    gray_900: "#1C1C1E"         # 最深（標題、sidebar 背景）
    gray_600: "#636366"         # 中灰（副文字、取消按鈕）
    gray_300: "#E5E5EA"         # 淺灰（邊框、分隔線、segmented bg）

    # 紅 × 3
    red: "#FF3B30"              # 系統紅（刪除、危險操作）
    red_light: "#FFF0E0"        # 紅淺底（同 brand_light，用於未付款警示）
    red_dark: "#C84B00"         # 深紅橘（未付款強調文字）

    # 功能色
    blue: "#007AFF"             # iOS 系統藍（連結、核銷按鈕、資訊狀態）
    green: "#34C759"            # iOS 系統綠（成功、已付款、還件）
    warning: "#FF9500"          # 系統橘（收款按鈕、警告 badge）

    # 背景
    white: "#FFFFFF"            # 卡片、header、detail 背景
    surface: "#F2F2F7"          # 主背景（iOS system grouped bg）
    sidebar: "#1C1C1E"          # sidebar 深色背景

    # 文字
    label: "#8E8E93"            # 輔助文字（iOS secondaryLabel）
    placeholder: "#C7C7CC"      # placeholder / 完成狀態文字

  typography:
    font: "-apple-system"       # SF Pro / system font
    size:
      sm: 13                    # 標籤、badge、section header
      md: 15                    # 內文、field value
      lg: 17                    # 卡片標題、dialog 主文字

  spacing: 4                    # 基準 4pt：4/8/12/16/20/24

  corner_radius: 13             # 卡片圓角（iOS large radius style）

  style: "iOS-native"           # iOS system style：grouped bg、card elevation、SF Pro

  # 元件規則
  components:
    sidebar:
      width: 68
      bg: "#1C1C1E"
      active_indicator: "3px left bar, brand color"
    page_header:
      height: 50
      title: "center-aligned, 16px semibold"
    card:
      radius: 13
      shadow: "0 1px 3px rgba(0,0,0,0.07)"
      padding: "13px 15px"
    segmented_control:
      bg: "#E5E5EA"
      active_bg: "#FFFFFF"
      radius: 8
    dialog:
      width: 300
      radius: 15
    toast:
      bg: "rgba(40,40,40,0.9)"
      radius: 20
    cta_button:
      radius: 8
      padding: "8px 18px"

platform:
  type: "iPad UIKit"
  orientation: "landscape"
  viewport:
    width: 1024
    height: 768
    frame_radius: 20

language: "zh-TW"

constraints: []
